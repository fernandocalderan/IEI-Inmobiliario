<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Vendabilidad™ | Admin Login</title>
  <link rel="stylesheet" href="../assets/vendabilidad.css" />
  <link rel="icon" type="image/png" href="../assets/logo_nuevo.png" />
  <meta name="theme-color" content="#2B446F" />
</head>
<body data-page="admin-login">
  <header class="container site-header">
    <div class="site-header-inner">
      <a class="brand-wrap" href="../index.html" aria-label="Ir al sitio de Vendabilidad">
        <img class="brand-logo" src="../assets/logo_nuevo.png" alt="Vendabilidad — Índice de Evaluación Integral" />
        <div class="brand-sub">Panel de administración IEI™</div>
      </a>
      <a class="button button-ghost" href="../index.html">Sitio</a>
    </div>
  </header>

  <main class="container panel" style="max-width:480px">
    <h2>Acceso admin</h2>
    <div id="admin-error" class="error"></div>
    <form id="admin-login-form">
      <label>Contraseña</label>
      <input type="password" name="password" required />
      <button class="button button-premium" type="submit">Entrar</button>
    </form>
  </main>

  <script src="../assets/runtime-config.js"></script>
  <script src="../assets/admin.js"></script>
</body>
</html>
